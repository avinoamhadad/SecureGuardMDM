name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Assemble debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK (r25c)
        run: |
          yes | sdkmanager --install "ndk;25.2.9519653" "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> "$GITHUB_ENV"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Locate APK
        id: apk
        run: |
          apk_path=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "path=$apk_path" >> "$GITHUB_OUTPUT"
          echo "Found APK: $apk_path"
          ls -lh "$apk_path"

      - name: Print APK signature info
        run: |
          # Use apksigner from the latest build-tools to print signer info.
          BT=$(ls -1 "$ANDROID_SDK_ROOT/build-tools" | sort -V | tail -1)
          "$ANDROID_SDK_ROOT/build-tools/$BT/apksigner" verify --print-certs --verbose "${{ steps.apk.outputs.path }}" || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Abloq-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
